<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IrisAdapt Pro</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">👁️</div>
      <h1>IrisAdapt Pro</h1>
      <p class="subtitle">Hệ thống bảo vệ mắt thông minh</p>
    </header>

    <div class="status-card" id="statusCard">
      <div class="status-indicator" id="statusIndicator"></div>
      <div class="status-text">
        <span id="statusText">Đang tắt</span>
        <span class="blur-level" id="blurLevel">Blur: 0px</span>
      </div>
    </div>

    <button id="toggleBtn" class="toggle-btn">
      <span id="toggleIcon">▶</span>
      <span id="toggleText">Bắt đầu theo dõi</span>
    </button>

    <div id="errorMsg" class="error-msg"></div>

    <div class="settings-section">
      <h2>⚙️ Cài đặt</h2>

      <div class="setting-item">
        <label>Độ mờ tối đa</label>
        <div class="slider-container">
          <input type="range" id="maxBlur" min="5" max="25" value="15" class="slider">
          <span id="maxBlurValue">15px</span>
        </div>
      </div>

      <div class="setting-item">
        <label>Độ nhạy</label>
        <div class="slider-container">
          <input type="range" id="sensitivity" min="10" max="90" value="50" class="slider">
          <span id="sensitivityValue">50%</span>
        </div>
      </div>

      <div class="setting-item">
        <label>Thông báo desktop</label>
        <div class="toggle-container">
          <input type="checkbox" id="notifications" checked class="toggle-checkbox">
          <label for="notifications" class="toggle-label"></label>
        </div>
      </div>

      <div class="setting-item">
        <label>Khoảng cách thông báo</label>
        <div class="slider-container">
          <input type="range" id="cooldown" min="10" max="120" value="30" step="5" class="slider">
          <span id="cooldownValue">30s</span>
        </div>
      </div>
    </div>

    <footer>
      <p>IrisAdapt Pro v1.0 • Bảo vệ đôi mắt của bạn</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
